server:
  servlet:
    context-path: /sales

spring:
  application:
    name: sales

  threads:
    virtual:
      enabled: true # Java 21 Virtual Thread 사용

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: ${DEFER_DATASOURCE_INITIALIZATION:true}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Seoul
        default_schema: ${DB_SCHEMA:bbd}

  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      encoding: UTF-8

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka.inwoohub.com:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:sales-hq-notification}
      auto-offset-reset: ${KAFKA_OFFSET_RESET:earliest}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
  http:
    serviceclient:
      bbd-user-service:
        base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081/user}
      bbd-item-service:
        base-url: ${ITEM_SERVICE_BASE_URL:http://localhost:8082/item}
      bbd-inventory-service:
        base-url: ${INVENTORY_SERVICE_BASE_URL:http://localhost:8083/inventory}
      bbd-procurement-service:
        base-url: ${PROCUREMENT_SERVICE_BASE_URL:http://localhost:8084/procurement}
      bbd-sales-service:
        base-url: ${SALES_SERVICE_BASE_URL:http://localhost:8085/sales}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  config:
    import: optional:file:.env[.properties]

bbd:
  security:
    enabled: true
    permit-all-paths:
      - /actuator/health
      - /actuator/health/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**

# 레거시 창고 어댑터(InventoryHttpConfig)가 ${inventory.base-url} 를 요구한다(기본값 없음).
# 이 프로필(public)에 없으면 컨텍스트 기동 실패(placeholder 미해결). 빈 생성 시 네트워크 호출은 없으므로 값이 틀려도 기동은 됨.
# application.yml 과 동일 형태로 둠. 신규 @ImportHttpServices(bbd-inventory-service)로 완전 이관되면 제거 가능.
inventory:
  base-url: ${INVENTORY_BASE_URL:http://localhost:8081}

# Swagger
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    url: /sales/v3/api-docs
    config-url: /sales/v3/api-docs/swagger-config

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace