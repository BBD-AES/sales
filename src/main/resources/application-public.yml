server:
  servlet:
    context-path: /sales

spring:
  application:
    name: sales

  threads:
    virtual:
      enabled: true # Java 21 Virtual Thread 사용

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # #55 P1: 비관락(FOR UPDATE) 대기 상한. Postgres 기본 lock_timeout=0(무한)이라 락 보유가 길어지면 대기
      #         트랜잭션이 무한 블록 → 커넥션풀 고갈로 번진다. 세션 lock_timeout 으로 상한을 둬 초과 시 빠르게 실패
      #         (GlobalExceptionHandler 가 PessimisticLockingFailureException → 409 로 매핑). 잠금 대기에만 적용(일반 쿼리 무관).
      connection-init-sql: SET lock_timeout = '3s'

  jpa:
    hibernate:
#      ddl-auto: create
      ddl-auto: update
    defer-datasource-initialization: ${DEFER_DATASOURCE_INITIALIZATION:true}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Seoul
        default_schema: ${DB_SCHEMA:bbd}

  sql:
    init:
      mode: never
#      mode: ${SQL_INIT_MODE:always}
#      encoding: UTF-8

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka.inwoohub.com:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

    consumer:
      # 각 @KafkaListener가 groupId 명시(예: StockReplenishedListener=sales-backorder) → 이 전역 기본값은 fallback(현재 미사용).
      # #65로 submit-알림 Kafka 컨슈머(옛 sales-hq-notification)가 제거돼 죽은 이름을 중립값으로 교체.
      group-id: ${KAFKA_CONSUMER_GROUP_ID:sales}
      auto-offset-reset: ${KAFKA_OFFSET_RESET:earliest}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
  http:
    client:                         # #69: 다운스트림 호출 타임아웃 — inventory 등이 hang 시 (트랜잭션 내 호출이라) DB 커넥션 무한 점유 방지
      connect-timeout: 2s
      read-timeout: 3s
    serviceclient:
      bbd-user-service:
        base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081/user}
      bbd-item-service:
        base-url: ${ITEM_SERVICE_BASE_URL:http://localhost:8082/item}
      bbd-inventory-service:
        base-url: ${INVENTORY_SERVICE_BASE_URL:http://localhost:8083/inventory}
      bbd-procurement-service:
        base-url: ${PROCUREMENT_SERVICE_BASE_URL:http://localhost:8084/procurement}
      bbd-sales-service:
        base-url: ${SALES_SERVICE_BASE_URL:http://localhost:8085/sales}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: true

  config:
    import: optional:file:.env[.properties]

  jackson:
    deserialization:
      accept-float-as-int: false
      fail-on-unknown-properties: false   # 다운스트림(inventory 등) 응답 필드 추가/축소돼도 안 깨지게(관용 역직렬화). local/public 정렬.

bbd:
  security:
    enabled: true
    permit-all-paths:
      - /actuator/health
      - /actuator/health/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**

# Actuator 헬스: context-path 하위 노출 → /sales/actuator/health (+ /liveness, /readiness).
# permit-all-paths 에 /actuator/health(/**) 가 있어 인증 없이 통과.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

# Swagger
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    url: /sales/v3/api-docs
    config-url: /sales/v3/api-docs/swagger-config

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
