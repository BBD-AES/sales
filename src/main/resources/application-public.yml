spring:
  application:
    name: sales

  threads:
    virtual:
      enabled: true # 자바 21 버전을 통해서 이번에 버츄얼 스레드도 한번 써보기

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true   # data.sql 을 Hibernate 스키마 생성 이후 실행
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        show_sql: false
        jdbc:
          time_zone: Asia/Seoul
        default_schema: bbd

  sql:
    init:
      mode: always       # data.sql 시드 자동 로드(데모). 끄려면 never
      encoding: UTF-8

# Swagger
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    url: /sales/v3/api-docs
    config-url: /sales/v3/api-docs/swagger-config



