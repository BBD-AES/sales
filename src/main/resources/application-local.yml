server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /sales

spring:
  application:
    name: sales

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: ${DEFER_DATASOURCE_INITIALIZATION:true}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Seoul
        default_schema: ${DB_SCHEMA:bbd}

  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      encoding: UTF-8

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka.inwoohub.com:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:sales-hq-notification}
      auto-offset-reset: ${KAFKA_OFFSET_RESET:earliest}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    url: /sales/v3/api-docs
    config-url: /sales/v3/api-docs/swagger-config

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace